<style>
/* Forcer taille des images dans la grille */
.product-card img {
    width: 100%;

    object-fit: cover;   /* remplit le cadre sans déformer */
    border-radius: 10px;
    cursor: pointer;
}

/* Prix sous chaque image */
.product-card .price {
    margin-top: 6px;
    font-weight: 700;
    color: #fff;
    font-size: 1rem;
    text-align: center;
}

/* Grille responsive */
.products {

    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 16px;
}

<!-- Modal produit -->
<div id="productModal" class="modal" aria-hidden="true">

    <h2 id="prodTitle"></h2>

    <button id="prodAdd" class="cta">Ajouter au panier</button>
  </div>

<script src="script.js"></script>
<!-- Modal plein écran pour les images -->
<div id="fullscreenModal" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    z-index:999999;
    display:flex;
    justify-content:center;
    align-items:center;
">
    <img id="fullscreenImg" style="max-width:95%; max-height:95%; border-radius:12px;">
</div>

<script>
// Fonction plein écran
function openFullScreen(src) {
    const modal = document.getElementById("fullscreenModal");
    document.getElementById("fullscreenImg").src = src;
    modal.style.display = "flex";
}

// Clique pour fermer
document.getElementById("fullscreenModal").onclick = function () {
    this.style.display = "none";
};
</script>
